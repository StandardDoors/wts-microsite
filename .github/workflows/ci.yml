name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - 'feature/**'
      - 'fix/**'
  workflow_call:

permissions:
  contents: read

jobs:
  lint:
    name: Lint (PHP_CodeSniffer)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup PHP project
        uses: ./.github/actions/setup-php-project
        with:
          php-tools: 'composer:v2, cs2pr'

      - name: Run PHP_CodeSniffer
        run: vendor/bin/phpcs --report=checkstyle -q | cs2pr

  analyse:
    name: Static Analysis (PHPStan)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup PHP project
        uses: ./.github/actions/setup-php-project

      - name: Run PHPStan
        run: composer analyse -- --error-format=github

  test:
    name: Tests (PHPUnit)
    runs-on: ubuntu-latest

    env:
      TZ: America/Toronto

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup PHP project
        uses: ./.github/actions/setup-php-project
        with:
          php-extensions: intl

      - name: Run tests
        run: composer test

  test-urls:
    name: URL Validation
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup PHP project
        uses: ./.github/actions/setup-php-project

      - name: Build site
        run: composer build

      - name: Run URL validation tests
        run: composer test:network
        continue-on-error: true

  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    needs: [lint, analyse, test]

    env:
      TZ: America/Toronto

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup PHP project
        uses: ./.github/actions/setup-php-project
        with:
          php-extensions: intl

      - name: Build static site
        run: composer build

      - name: Validate HTML output
        run: composer test:html

      - name: Validate HTML with Nu Checker (W3C)
        if: ${{ !env.ACT }}
        run: |
          docker run --rm \
            -v "$(pwd)/dist":/dist \
            ghcr.io/validator/validator:24.10.17 \
            vnu --errors-only --skip-non-html /dist

      - name: Verify build output
        run: |
          if [ ! -d "dist" ]; then
            echo "Error: dist directory not created"
            exit 1
          fi

          HTML_COUNT=$(find dist -name "*.html" | wc -l)
          if [ "$HTML_COUNT" -eq 0 ]; then
            echo "Error: No HTML files generated"
            exit 1
          fi

          echo "Build successful: $HTML_COUNT HTML files generated"
          ls -la dist/
